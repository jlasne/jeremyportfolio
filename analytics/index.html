<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tasu.ai · Analytics</title>

  <!-- This page is intentionally private: not linked from the site, and not indexed. -->
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#f4f3ec">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="icon" href="../favicon.ico" sizes="any">

  <!--
    ============================================================================
    PASSWORD GATE
    ----------------------------------------------------------------------------
    Access is gated client-side by a SHA-256 hash of the password. This keeps the
    page out of casual / public view (it is a static page on GitHub Pages, which
    has no server to do real auth). It is access-gating for an illustrative
    dashboard — not server-grade security.

    Default password:  tasu-analytics-2026

    To change it, compute a new hash and replace PASS_HASH below:
        printf '%s' 'your-new-password' | shasum -a 256

    For real protection of real revenue numbers, gate at the host level
    (Cloudflare Access, Vercel password protection, or HTTP basic auth) and
    serve the data from a server route — never ship live Stripe/PostHog keys to
    the browser. See DATA() at the bottom for the single swap-in point.
    ============================================================================
  -->

  <style>
    *,*::before,*::after { box-sizing: border-box; }
    :root{
      --bg:#f4f3ec; --panel:#ffffff; --panel-2:#faf9f4;
      --ink:#1a1813; --ink-2:#3c382f; --muted:#6f6a5d; --faint:#a39d8e;
      --line:#e9e5da; --line-2:#f1ede3;
      --accent:#cc785c; --accent-ink:#b35c3d; --accent-soft:#f6e9e1; --accent-bar:#e7cab8;
      --up:#6f8a5b; --down:#bf5540;
      --red:#bf5540; --red-soft:#f6e3dd; --amber:#c08a2e;
      --radius:16px; --radius-sm:11px;
      --shadow:0 1px 2px rgba(60,50,30,.05), 0 1px 3px rgba(60,50,30,.06);
      --shadow-pop:0 10px 30px rgba(60,45,25,.14);
      --font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      --serif:"Tiempos Text",ui-serif,Georgia,Cambria,"Times New Roman",serif;
      --mono:"Geist Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    }
    html[data-theme="dark"]{
      --bg:#1f1e1a; --panel:#272620; --panel-2:#222017;
      --ink:#f0ede2; --ink-2:#d4cfc1; --muted:#a39d8d; --faint:#7a7466;
      --line:#38352c; --line-2:#2c2a22;
      --accent:#d68a6c; --accent-ink:#e0a184; --accent-soft:#382519; --accent-bar:#5a3a28;
      --up:#94ad7f; --down:#e08a72;
      --red:#e08a72; --red-soft:#321d17; --amber:#e0a85a;
      --shadow:0 1px 2px rgba(0,0,0,.35); --shadow-pop:0 14px 36px rgba(0,0,0,.55);
    }
    html,body{margin:0;padding:0;}
    body{
      background:var(--bg); color:var(--ink); font-family:var(--font);
      font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    a{color:inherit;}
    button{font-family:inherit;cursor:pointer;}
    .mono{font-family:var(--mono);font-feature-settings:"tnum" 1;}
    .tnum{font-variant-numeric:tabular-nums;}

    /* ───────────── Login gate ───────────── */
    #gate{
      position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
      padding:24px;
      background:
        radial-gradient(1100px 560px at 50% -8%, rgba(204,120,92,.12), transparent 60%),
        var(--bg);
    }
    .gate-card{
      width:100%; max-width:380px; background:var(--panel); border:1px solid var(--line);
      border-radius:var(--radius); box-shadow:var(--shadow-pop); padding:30px 28px 26px;
      text-align:center;
    }
    .gate-logo{
      width:46px;height:46px;border-radius:13px;margin:0 auto 16px;
      background:linear-gradient(150deg,var(--accent),var(--accent-ink));
      display:flex;align-items:center;justify-content:center;color:#fff;
      box-shadow:0 6px 16px rgba(204,120,92,.32);
    }
    .gate-logo svg{width:24px;height:24px;}
    .gate-card h1{font-family:var(--serif);font-size:21px;font-weight:600;margin:0 0 4px;letter-spacing:-.01em;}
    .gate-card p{color:var(--muted);font-size:13px;margin:0 0 20px;}
    .gate-form{display:flex;flex-direction:column;gap:10px;}
    .gate-input{
      width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;
      background:var(--panel-2);color:var(--ink);font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s;
    }
    .gate-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
    .gate-btn{
      width:100%;padding:11px 13px;border:none;border-radius:10px;font-size:14px;font-weight:600;
      background:var(--accent);color:#fff;transition:filter .15s,transform .05s;
    }
    .gate-btn:hover{filter:brightness(1.05);}
    .gate-btn:active{transform:translateY(1px);}
    .gate-err{color:var(--red);font-size:12.5px;min-height:16px;margin-top:2px;}
    .gate-foot{margin-top:18px;color:var(--faint);font-size:11.5px;}
    .shake{animation:shake .4s;}
    @keyframes shake{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-4px)}40%,60%{transform:translateX(4px)}}

    /* ───────────── App shell ───────────── */
    #app{max-width:1180px;margin:0 auto;padding:0 20px 64px;}
    .topbar{
      display:flex;align-items:center;gap:14px;padding:16px 2px 14px;flex-wrap:wrap;
    }
    .brand{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-weight:600;letter-spacing:-.01em;font-size:16px;}
    .brand .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(150deg,var(--accent),var(--accent-ink));
      display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 3px 9px rgba(204,120,92,.3);}
    .brand .dot svg{width:15px;height:15px;}
    .brand .sub{color:var(--faint);font-weight:500;}
    .spacer{flex:1;}
    .boot{padding:90px 20px;text-align:center;color:var(--muted);font-size:14px;}
    .srcbadge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--muted);
      background:var(--panel);border:1px solid var(--line);padding:6px 10px;border-radius:999px;letter-spacing:.04em;text-transform:uppercase;}
    .srcbadge.on{color:var(--accent-ink);background:var(--accent-soft);border-color:var(--accent-bar);}
    .live{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);
      background:var(--panel);border:1px solid var(--line);padding:6px 11px;border-radius:999px;}
    .live .pulse{width:7px;height:7px;border-radius:50%;background:var(--accent);position:relative;}
    .live .pulse::after{content:"";position:absolute;inset:-3px;border-radius:50%;background:var(--accent);opacity:.4;animation:ping 1.8s ease-out infinite;}
    @keyframes ping{0%{transform:scale(1);opacity:.5}80%,100%{transform:scale(2.6);opacity:0}}
    .seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;}
    .seg button{border:none;background:transparent;color:var(--muted);font-size:12.5px;font-weight:500;
      padding:6px 11px;border-radius:7px;transition:all .12s;}
    .seg button.on{background:var(--accent-soft);color:var(--accent-ink);font-weight:600;}
    .icon-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:9px;
      background:var(--panel);border:1px solid var(--line);color:var(--muted);transition:all .12s;}
    .icon-btn:hover{color:var(--ink);border-color:var(--faint);}
    .icon-btn svg{width:16px;height:16px;}
    .icon-btn.spin svg{animation:spin .7s linear;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Tabs */
    .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin:4px 0 22px;position:relative;}
    .tabs button{border:none;background:transparent;color:var(--muted);font-size:14px;font-weight:550;
      padding:11px 16px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .12s;}
    .tabs button:hover{color:var(--ink-2);}
    .tabs button.on{color:var(--accent-ink);border-bottom-color:var(--accent);}

    /* Layout helpers */
    .grid{display:grid;gap:14px;}
    .kpis{grid-template-columns:repeat(4,1fr);}
    .cols-2{grid-template-columns:1fr 1fr;}
    .cols-3{grid-template-columns:repeat(3,1fr);}
    .span-2{grid-column:span 2;}
    @media(max-width:880px){.kpis{grid-template-columns:repeat(2,1fr);}.cols-2,.cols-3{grid-template-columns:1fr;}.span-2{grid-column:auto;}}

    /* Card */
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
    .card-pad{padding:18px;}
    .card-h{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line-2);}
    .card-h h3{font-family:var(--serif);font-size:15px;font-weight:600;margin:0;letter-spacing:-.005em;}
    .card-h .hint{font-size:12px;color:var(--faint);font-weight:500;}

    /* KPI */
    .kpi{padding:16px 16px 15px;}
    .kpi .label{font-size:12px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:6px;}
    .kpi .val{font-size:25px;font-weight:680;letter-spacing:-.02em;margin-top:7px;line-height:1.1;}
    .kpi .delta{font-size:12px;font-weight:600;margin-top:6px;display:inline-flex;align-items:center;gap:3px;}
    .up{color:var(--up);} .down{color:var(--down);} .flat{color:var(--faint);}

    /* metric switch (chart) */
    .mswitch{display:flex;gap:0;flex-wrap:wrap;}
    .mtab{border:none;background:transparent;text-align:left;padding:13px 18px;border-right:1px solid var(--line-2);
      border-bottom:2px solid transparent;transition:background .12s;min-width:130px;flex:1;}
    .mtab:hover{background:var(--panel-2);}
    .mtab.on{border-bottom-color:var(--accent);background:var(--panel-2);}
    .mtab .ml{font-size:12px;color:var(--muted);font-weight:500;}
    .mtab .mv{font-size:21px;font-weight:680;letter-spacing:-.02em;margin-top:3px;}
    .mtab .md{font-size:11.5px;font-weight:600;margin-top:2px;}
    .chart-wrap{position:relative;padding:14px 8px 4px;}
    .chart-svg{display:block;width:100%;height:auto;overflow:visible;}
    .tip{position:absolute;pointer-events:none;background:var(--ink);color:var(--bg);font-size:11.5px;
      padding:6px 9px;border-radius:7px;transform:translate(-50%,-130%);white-space:nowrap;opacity:0;transition:opacity .1s;z-index:5;box-shadow:var(--shadow-pop);}
    .tip b{font-size:12.5px;}
    html[data-theme="dark"] .tip{background:#e8eef6;color:#0a0e16;}

    /* bar list */
    .blist{padding:6px 6px 8px;}
    .brow{position:relative;display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:8px 12px;border-radius:8px;font-size:13px;overflow:hidden;z-index:0;}
    .brow:hover{background:var(--panel-2);}
    .brow .bar{position:absolute;inset:0;background:var(--accent-soft);border-radius:8px;z-index:-1;transition:width .5s cubic-bezier(.2,.7,.2,1);}
    .brow .lab{display:flex;align-items:center;gap:9px;min-width:0;}
    .brow .lab .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .brow .flag{font-size:15px;line-height:1;}
    .brow .v{font-weight:600;white-space:nowrap;color:var(--ink-2);}
    .brow .v small{color:var(--faint);font-weight:500;margin-left:6px;}
    .src-ico{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;
      font-size:10px;font-weight:700;color:#fff;flex:none;}

    /* table */
    .tbl-scroll{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th,td{padding:11px 14px;text-align:right;white-space:nowrap;}
    th:first-child,td:first-child{text-align:left;}
    thead th{font-size:11.5px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--line);
      cursor:pointer;user-select:none;position:relative;}
    thead th:hover{color:var(--ink);}
    thead th .ar{opacity:.4;font-size:9px;margin-left:3px;}
    thead th.sorted .ar{opacity:1;color:var(--accent-ink);}
    tbody tr{border-bottom:1px solid var(--line-2);}
    tbody tr:last-child{border-bottom:none;}
    tbody tr:hover{background:var(--panel-2);}
    td .pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:var(--panel-2);border:1px solid var(--line);color:var(--ink-2);}
    .pill.scan{background:#eef2ff;border-color:#dbe2ff;color:#4f46e5;}
    .pill.monthly{background:var(--accent-soft);border-color:var(--accent-bar);color:var(--accent-ink);}
    .pill.annual{background:#fff4e5;border-color:#ffe2bd;color:var(--amber);}
    html[data-theme="dark"] .pill.scan{background:#1a1d3a;border-color:#2b2f5e;color:#a5b0ff;}
    html[data-theme="dark"] .pill.annual{background:#2a1f0e;border-color:#4a3818;}
    td.pos{color:var(--accent-ink);font-weight:600;} td.neg{color:var(--red);font-weight:600;}

    /* funnel */
    .funnel{padding:16px 18px 18px;display:flex;flex-direction:column;gap:3px;}
    .fstep{position:relative;}
    .fstep .fhead{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;}
    .fstep .fname{color:var(--ink-2);font-weight:550;}
    .fstep .fcount{color:var(--ink);font-weight:600;}
    .fstep .fcount small{color:var(--faint);font-weight:500;margin-left:6px;}
    .fbar-track{height:30px;background:var(--panel-2);border-radius:8px;overflow:hidden;}
    .fbar{height:100%;background:linear-gradient(90deg,var(--accent-ink),var(--accent));border-radius:8px;display:flex;align-items:center;
      padding-left:11px;color:#fff;font-size:12px;font-weight:600;transition:width .6s cubic-bezier(.2,.7,.2,1);}
    .fdrop{font-size:11px;color:var(--red);text-align:right;margin:3px 2px 8px;font-weight:500;}
    .fdrop.ok{color:var(--accent-ink);}

    /* retention */
    .ret{padding:14px;overflow-x:auto;}
    .ret table{font-size:12px;}
    .ret td,.ret th{text-align:center;padding:7px 6px;border:none;}
    .ret .cell{border-radius:6px;color:#fff;font-weight:600;min-width:46px;}
    .ret td:first-child{text-align:left;color:var(--muted);font-weight:500;white-space:nowrap;}

    /* scroll depth */
    .sd{padding:14px 18px;}
    .sd-row{display:flex;align-items:center;gap:12px;margin-bottom:11px;font-size:12.5px;}
    .sd-row .sdl{width:42px;color:var(--muted);}
    .sd-track{flex:1;height:9px;background:var(--panel-2);border-radius:6px;overflow:hidden;}
    .sd-fill{height:100%;background:linear-gradient(90deg,var(--accent-ink),var(--accent));border-radius:6px;}
    .sd-row .sdv{width:42px;text-align:right;font-weight:600;color:var(--ink-2);}

    .section-note{font-size:12.5px;color:var(--muted);margin:0 2px 14px;display:flex;align-items:flex-start;gap:7px;}
    .section-note svg{width:15px;height:15px;flex:none;margin-top:1px;color:var(--faint);}
    .foot{margin-top:30px;text-align:center;color:var(--faint);font-size:12px;}
    .foot a{color:var(--accent-ink);text-decoration:none;}
    [hidden]{display:none!important;}
    .view{animation:fade .25s ease;}
    @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>

  <!-- ░░░░░░░░░░ LOGIN GATE ░░░░░░░░░░ -->
  <div id="gate">
    <div class="gate-card">
      <div class="gate-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-4 3 3 4-6"/></svg>
      </div>
      <h1>Analytics</h1>
      <p>This dashboard is private. Enter the password to continue.</p>
      <form class="gate-form" id="gateForm" autocomplete="off">
        <input class="gate-input" id="gatePass" type="password" placeholder="Password" autocomplete="current-password" autofocus>
        <button class="gate-btn" type="submit">Unlock dashboard</button>
        <div class="gate-err" id="gateErr"></div>
      </form>
      <div class="gate-foot">tasu.ai · revenue &amp; product analytics</div>
    </div>
  </div>

  <!-- ░░░░░░░░░░ APP ░░░░░░░░░░ -->
  <div id="app" hidden></div>

  <script>
  /* ════════════════════════════════════════════════════════════════════════
     AUTH (client-side gate)
     ════════════════════════════════════════════════════════════════════════ */
  const PASS_HASH = "95f5ad6c4f49086ddaf7e773aa556ce5a711d0106d3c90b21c921c529c76b11f"; // sha256("tasu-analytics-2026")
  const SESSION_KEY = "tasu_analytics_unlocked";

  async function sha256(str){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  function unlock(){
    document.getElementById("gate").hidden = true;
    const app = document.getElementById("app");
    app.hidden = false;
    if(!app.dataset.rendered){ buildApp(); app.dataset.rendered = "1"; }
  }
  const gateForm = document.getElementById("gateForm");
  gateForm.addEventListener("submit", async (e)=>{
    e.preventDefault();
    const card = document.querySelector(".gate-card");
    const err = document.getElementById("gateErr");
    const val = document.getElementById("gatePass").value;
    if((await sha256(val)) === PASS_HASH){
      try{ sessionStorage.setItem(SESSION_KEY,"1"); }catch(_){}
      unlock();
    }else{
      err.textContent = "Incorrect password.";
      card.classList.remove("shake"); void card.offsetWidth; card.classList.add("shake");
      document.getElementById("gatePass").select();
    }
  });
  try{ if(sessionStorage.getItem(SESSION_KEY)==="1") unlock(); }catch(_){}

  /* ════════════════════════════════════════════════════════════════════════
     FORMAT HELPERS
     ════════════════════════════════════════════════════════════════════════ */
  const fmtN  = n => n.toLocaleString("en-US");
  const fmt$  = n => "$"+Math.round(n).toLocaleString("en-US");
  const fmt$2 = n => "$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtK  = n => { n=Math.round(n); return Math.abs(n)>=1000 ? (n/1000).toFixed(Math.abs(n)>=10000?0:1).replace(/\.0$/,"")+"k" : ""+n; };
  const pct   = n => (n>=10?n.toFixed(0):n.toFixed(1))+"%";
  const esc   = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  function deltaHTML(v){
    if(v===0) return `<span class="delta flat">— 0%</span>`;
    const up=v>0; const a=up?"▲":"▼";
    return `<span class="delta ${up?"up":"down"}">${a} ${Math.abs(v).toFixed(1)}%</span>`;
  }

  /* ════════════════════════════════════════════════════════════════════════
     APP
     ════════════════════════════════════════════════════════════════════════ */
  let DATA, STATE = { tab:"overview", range:90, metric:"revenue", live:false };

  // ── Live data ───────────────────────────────────────────────────────────
  // Served from Vercel, the page calls its own /api/dashboard (same origin) and
  // shows real Stripe + PostHog numbers. On GitHub Pages there is no API, so the
  // fetch 404s and we fall back to the demo dataset. To make the GitHub-Pages
  // copy live too, set API_BASE to your Vercel URL (the API already sends CORS).
  const API_BASE  = "";  // e.g. "https://jeremyportfolio.vercel.app"
  const API_TOKEN = "5ed69393b7e7bccf161cd4e6c49e4fda4e621a681649e569d39dd8cbad1287d9";
  const metricLite = (label, short, tip, fmt, series, dlt) => ({ label, short, tip, fmt, series, dlt });
  const SRC_COLORS = ["#cc785c","#4285f4","#1d9bf0","#da552f","#7c3aed","#6f8a5b","#c08a2e","#64748b"];

  async function loadData(){
    const demo = makeData();
    try{
      const r = await fetch((API_BASE || "") + "/api/dashboard",
        { headers: API_TOKEN ? { "x-dashboard-token": API_TOKEN } : {} });
      if(!r.ok) return demo;
      const live = await r.json();
      if(!live || live.error) return demo;
      STATE.live = true;
      return mergeLive(demo, live);
    }catch(e){ return demo; }
  }

  // Overwrite each section with live values where present; keep demo elsewhere so
  // the page is always fully shaped (no missing-field crashes).
  function mergeLive(demo, live){
    const d = { ...demo };
    if(live.online != null) d.online = live.online;
    if(live.kpi) d.kpi = { ...demo.kpi, ...live.kpi };
    if(live.metricsData){
      const defs = {
        revenue:  ["Revenue",       v=>"$"+fmtK(v), v=>fmt$(v), v=>fmt$(v)],
        visitors: ["Visitors",      v=>fmtK(v),     fmtN,       fmtN],
        signups:  ["Signups",       v=>fmtK(v),     fmtN,       fmtN],
        customers:["New customers", v=>fmtK(v),     fmtN,       fmtN],
      };
      d.metrics = {};
      for(const k in defs){
        const md = live.metricsData[k], base = demo.metrics[k];
        const series = (md && Array.isArray(md.series) && md.series.length) ? md.series : base.series;
        const dlt = (md && typeof md.dlt === "number") ? md.dlt : base.dlt;
        d.metrics[k] = metricLite(defs[k][0], defs[k][1], defs[k][2], defs[k][3], series, dlt);
      }
    }
    for(const key of ["sources","plans","countries","recent","funnelConv","funnelOnb","features","clickmap","scroll","pages","retention"]){
      if(Array.isArray(live[key]) && live[key].length) d[key] = adaptSection(key, live[key]);
    }
    return d;
  }
  function adaptSection(key, arr){
    if(key === "sources") return arr.map((s,i)=>({
      campaign:"", referrer:"", source:"", visitors:0, signups:0, customers:0, mrr:0, total:0,
      ...s, name: s.name || s.channel || "—", channel: s.channel || s.name || "—",
      color: s.color || { bg: SRC_COLORS[i % SRC_COLORS.length], t: String(s.name || "?").trim().charAt(0).toUpperCase() },
    }));
    if(key === "recent") return arr.map(r=>({ flag:"", planKey:"scan", source:"—", country:"—", when:"", ...r }));
    return arr;
  }

  function sourceTable(){
    const dim = STATE.dim||"channel";

      conv: s.customers/s.visitors*100, mrr:s.mrr, total:s.total,

    }));
    // merge rows that share the same dimension label
    const merged={};
    rows.forEach(r=>{
      const k=r.name;
      if(!merged[k]) merged[k]={name:k,visitors:0,signups:0,customers:0,mrr:0,total:0};
      merged[k].visitors+=r.visitors; merged[k].signups+=r.signups; merged[k].customers+=r.customers;
      merged[k].mrr+=r.mrr; merged[k].total+=r.total;
    });
    let list=Object.values(merged).map(r=>({...r,conv:r.customers/r.visitors*100,rpv:r.total/r.visitors}));
    const sk=STATE.srcSort||"mrr", dir=STATE.srcDir==null?-1:STATE.srcDir;
    list.sort((a,b)=> (a[sk]<b[sk]?-1:a[sk]>b[sk]?1:0)*dir);

  function barList(rows){
    const max=Math.max(...rows.map(r=>r.value),1);
    return `<div class="blist">${rows.map(r=>{
      const w=(r.value/max*100).toFixed(1);
      const lead = r.flag ? `<span class="flag">${r.flag}</span>`
                 : r.icon ? `<span class="src-ico" style="background:${r.icon.bg}">${r.icon.t}</span>` : "";
      return `<div class="brow">
        <span class="bar" data-bar="${w}" style="width:0"></span>
        <span class="lab">${lead}<span class="nm">${esc(r.label)}</span></span>
        <span class="v tnum">${r.display}${r.sub?`<small>${esc(r.sub)}</small>`:""}</span>
      </div>`;
    }).join("")}</div>`;
  }

  function funnel(steps,showDrop){
    const top=steps[0].count;
    return `<div class="funnel">${steps.map((s,i)=>{
      const ofTop=s.count/top*100;
      const drop = i>0 ? (1 - s.count/steps[i-1].count)*100 : 0;
      return `<div class="fstep">
        <div class="fhead"><span class="fname">${esc(s.name)}</span>
          <span class="fcount tnum">${fmtN(s.count)}<small>${ofTop.toFixed(1)}%</small></span></div>
        <div class="fbar-track"><div class="fbar" data-bar="${Math.max(ofTop,3).toFixed(1)}" style="width:0"></div></div>
        ${showDrop&&i>0?`<div class="fdrop">▼ ${drop.toFixed(1)}% drop-off</div>`:`<div style="height:6px"></div>`}
      </div>`;
    }).join("")}
    <div class="fdrop ok" style="text-align:left;margin-top:2px">Overall ${ (steps[steps.length-1].count/top*100).toFixed(1) }% conversion</div>
    </div>`;
  }

  function retention(grid){
    const wk=grid[0].vals.length;
    const color=v=>{
      const a=Math.max(.08, v/100);
      return `background:rgba(204,120,92,${a.toFixed(2)})`;
    };
    return `<div class="ret"><table>
      <thead><tr><th>Cohort</th>${Array.from({length:wk},(_,i)=>`<th>W${i}</th>`).join("")}</tr></thead>
      <tbody>${grid.map(g=>`<tr><td>${esc(g.cohort)}</td>${g.vals.map((v,i)=>

      ).join("")}</tr>`).join("")}</tbody>
    </table></div>`;
  }

  /* ════════════════════════════════════════════════════════════════════════
     CHARTS (hand-built SVG area chart, no deps)
     ════════════════════════════════════════════════════════════════════════ */
  function sliceRange(series){ return series.slice(series.length-STATE.range); }
  function sumRange(series){ return sliceRange(series).reduce((a,b)=>a+b.v,0); }

  function drawAllCharts(){ if(STATE.tab==="overview") drawMain(); }
  function drawMain(){
    const host=document.getElementById("mainChart"); if(!host) return;
    const m=DATA.metrics[STATE.metric];
    drawArea(host, sliceRange(m.series), m);
  }

  function drawArea(host, data, meta){
    const W=Math.max(host.clientWidth||host.parentElement.clientWidth||720, 320), H=270;
    const pad={l:6,r:48,t:18,b:26};
    const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
    const vals=data.map(d=>d.v);
    let max=Math.max(...vals), min=Math.min(...vals,0);
    max = max + (max-min)*0.12 || 1;
    const X=i=>pad.l + (data.length<2?iw/2:i*iw/(data.length-1));
    const Y=v=>pad.t + ih - (v-min)/(max-min||1)*ih;

    const line = data.map((d,i)=>`${i?"L":"M"}${X(i).toFixed(1)} ${Y(d.v).toFixed(1)}`).join(" ");
    const area = `${line} L${X(data.length-1).toFixed(1)} ${(pad.t+ih).toFixed(1)} L${X(0).toFixed(1)} ${(pad.t+ih).toFixed(1)} Z`;

    // y gridlines (4)
    let grid="",ylab="";
    for(let g=0;g<=3;g++){
      const v=min+(max-min)*g/3, y=Y(v);
      grid+=`<line x1="${pad.l}" y1="${y.toFixed(1)}" x2="${pad.l+iw}" y2="${y.toFixed(1)}" stroke="var(--line-2)" stroke-width="1"/>`;
      ylab+=`<text x="${pad.l+iw+8}" y="${(y+4).toFixed(1)}" fill="var(--faint)" font-size="11">${meta.short(v)}</text>`;
    }
    // x labels (~5)
    let xlab="";const step=Math.max(1,Math.floor((data.length-1)/4));
    for(let i=0;i<data.length;i+=step){
      xlab+=`<text x="${X(i).toFixed(1)}" y="${H-6}" fill="var(--faint)" font-size="11" text-anchor="middle">${data[i].d}</text>`;
    }
    const gid="grad"+meta.label.replace(/\W/g,"");
    host.innerHTML=`
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
        <defs><linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stop-color="var(--accent)" stop-opacity="0.22"/>
          <stop offset="1" stop-color="var(--accent)" stop-opacity="0"/>
        </linearGradient></defs>
        ${grid}
        <path d="${area}" fill="url(#${gid})"/>
        <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
        ${ylab}${xlab}
        <g id="hoverG" style="opacity:0">
          <line id="hoverLine" y1="${pad.t}" y2="${pad.t+ih}" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3 3"/>
          <circle id="hoverDot" r="4.5" fill="var(--accent)" stroke="var(--panel)" stroke-width="2.5"/>
        </g>
        <rect id="hoverHit" x="0" y="0" width="${W}" height="${H}" fill="transparent"/>
      </svg>
      <div class="tip" id="tip"></div>`;

    // hover
    const svg=host.querySelector("svg"), hit=host.querySelector("#hoverHit");
    const g=host.querySelector("#hoverG"), ln=host.querySelector("#hoverLine"), dot=host.querySelector("#hoverDot"), tip=host.querySelector("#tip");
    hit.addEventListener("mousemove",ev=>{
      const r=svg.getBoundingClientRect();
      const mx=(ev.clientX-r.left)/r.width*W;
      let i=Math.round((mx-pad.l)/(iw/(data.length-1))); i=Math.max(0,Math.min(data.length-1,i));
      const x=X(i),y=Y(data[i].v);
      g.style.opacity=1; ln.setAttribute("x1",x); ln.setAttribute("x2",x); dot.setAttribute("cx",x); dot.setAttribute("cy",y);
      tip.style.opacity=1; tip.style.left=(x/W*r.width)+"px"; tip.style.top=(y/H*r.height)+"px";
      tip.innerHTML=`<b>${meta.tip(data[i].v)}</b><br>${data[i].full||data[i].d}`;
    });
    hit.addEventListener("mouseleave",()=>{ g.style.opacity=0; tip.style.opacity=0; });
  }

  function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
